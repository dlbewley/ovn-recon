# Beads Configuration File
# Team defaults for this repository. Local runtime state lives in
# .beads/metadata.json and the embedded Dolt store.

issue-prefix: "ovn-recon"

# Auto-export JSONL for lightweight viewing and git-based review. Do not
# auto-stage it: this worktree marks .beads/issues.jsonl skip-worktree, and
# auto git-add fails under that local checkout state.
export.auto: true
export.path: "issues.jsonl"
export.interval: "60s"
export.git-add: false
