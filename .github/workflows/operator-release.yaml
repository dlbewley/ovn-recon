name: Operator Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths:
      - 'operator/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'operator/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Install Operator SDK
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        OPERATOR_SDK_VERSION=v1.42.0
        OS=$(go env GOOS)
        ARCH=$(go env GOARCH)
        curl -sSLo operator-sdk https://github.com/operator-framework/operator-sdk/releases/download/${OPERATOR_SDK_VERSION}/operator-sdk_${OS}_${ARCH}
        chmod +x operator-sdk
        sudo mv operator-sdk /usr/local/bin/

    - name: Set Release Metadata
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "VERSION_NUM=${VERSION#v}" >> $GITHUB_ENV
        if [[ "$VERSION" == *"-"* ]]; then
          # Set pre-release images to expire in 30 days in Quay
          EXPIRY_TIME=$(date -d "30 days" +%s)
          echo "EXPIRY_LABEL=--label quay.expires-at=$EXPIRY_TIME" >> $GITHUB_ENV
        else
          echo "EXPIRY_LABEL=" >> $GITHUB_ENV
        fi

    - name: Build
      run: |
        cd operator
        make build

    - name: Test
      run: |
        cd operator
        make test

    - name: Set up QEMU
      if: startsWith(github.ref, 'refs/tags/v')
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      if: startsWith(github.ref, 'refs/tags/v')
      uses: docker/setup-buildx-action@v3

    - name: Login to Quay.io
      if: startsWith(github.ref, 'refs/tags/v')
      uses: docker/login-action@v3
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_USER }}
        password: ${{ secrets.QUAY_TOKEN }}

    - name: Build and push operator image (multi-arch)
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        DOCKER_BUILDX_NO_ISOLATED_BUILDER: "1"
        PLATFORMS: linux/amd64,linux/arm64
      run: |
        cd operator
        echo "Building version $VERSION with $EXPIRY_LABEL"
        if [[ "$VERSION" != *"-"* ]]; then
          make docker-buildx IMG=quay.io/dbewley/ovn-recon-operator:$VERSION BUILD_ARGS="$EXPIRY_LABEL" \
            IMAGE_EXTRA_TAG=quay.io/dbewley/ovn-recon-operator:latest
        else
          make docker-buildx IMG=quay.io/dbewley/ovn-recon-operator:$VERSION BUILD_ARGS="$EXPIRY_LABEL"
        fi

    - name: Generate Bundle
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        set -o pipefail
        cd operator

        # Update operator version in manager.yaml so controller defaults to this version
        sed -i "s/value: dev/value: ${VERSION}/" config/manager/manager.yaml

        IMG=quay.io/dbewley/ovn-recon-operator:$VERSION
        # Prepare prerequisites - these will create bin/kustomize and ensure operator-sdk is available
        make manifests
        make kustomize
        # Verify kustomize was created (make kustomize installs to bin/kustomize)
        if [ ! -f bin/kustomize ]; then
          echo "Error: kustomize binary not found at bin/kustomize"
          ls -la bin/ || echo "bin directory does not exist"
          exit 1
        fi
        # Use system-installed operator-sdk (installed to /usr/local/bin in previous step)
        # Update manager image in kustomize config
        cd config/manager && ../../bin/kustomize edit set image controller=$IMG
        cd ../..
        rm -rf bundle
        # Generate bundle - base CSV already has all metadata, so no prompts needed
        if [[ "$VERSION" == *"-"* ]]; then
          CHANNELS=latest
          DEFAULT_CHANNEL=latest
        else
          CHANNELS=stable,latest
          DEFAULT_CHANNEL=stable
        fi
        bin/kustomize build config/manifests | operator-sdk generate bundle -q --overwrite --version $VERSION_NUM --channels $CHANNELS --default-channel $DEFAULT_CHANNEL
        operator-sdk bundle validate ./bundle
        csv_count=$(find bundle/manifests -maxdepth 1 -name '*.clusterserviceversion.yaml' | wc -l | tr -d '[:space:]')
        if [ "$csv_count" -ne 1 ]; then
          echo "Error: expected exactly 1 CSV in bundle/manifests, found $csv_count"
          ls -1 bundle/manifests/*.clusterserviceversion.yaml || true
          exit 1
        fi
        if rg -n --no-messages '"tag": "latest"' bundle/manifests/*.clusterserviceversion.yaml; then
          echo "Error: bundle alm-examples must not pin image tag to latest"
          exit 1
        fi
        if rg -n --no-messages 'image:\s*controller:latest' bundle/manifests; then
          echo "Error: bundle contains an unqualified controller image"
          exit 1
        fi
        if rg -n --no-messages 'image:\s*ovn-recon-operator:latest' bundle/manifests; then
          echo "Error: bundle contains an unqualified ovn-recon-operator image"
          exit 1
        fi

    - name: Prepare Community Operators Artifact
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        set -euo pipefail
        PACKAGE_ROOT=community-operators/ovn-recon-operator
        VERSION_DIR=${PACKAGE_ROOT}/${VERSION_NUM}
        mkdir -p "${VERSION_DIR}"
        cp -R operator/bundle/manifests "${VERSION_DIR}/"
        cp -R operator/bundle/metadata "${VERSION_DIR}/"
        cat > "${PACKAGE_ROOT}/ci.yaml" <<'EOF'
        updateGraph: semver-mode
        reviewers:
          - dlbewley
        EOF

    - name: Upload Community Operators Artifact
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: community-operators-${{ env.VERSION }}
        path: community-operators
        if-no-files-found: error

    - name: Build and push bundle image (multi-arch)
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        cd operator
        BUNDLE_IMG=quay.io/dbewley/ovn-recon-operator-bundle:$VERSION
        if [[ "$VERSION" != *"-"* ]]; then
          make bundle-buildx BUNDLE_IMG=$BUNDLE_IMG BUILD_ARGS="$EXPIRY_LABEL" \
            BUNDLE_EXTRA_IMG=quay.io/dbewley/ovn-recon-operator-bundle:latest
        else
          make bundle-buildx BUNDLE_IMG=$BUNDLE_IMG BUILD_ARGS="$EXPIRY_LABEL"
        fi

    - name: Build and push catalog image (multi-arch)
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        cd operator
        BUNDLE_IMG=quay.io/dbewley/ovn-recon-operator-bundle:$VERSION
        CATALOG_IMG=quay.io/dbewley/bewley-operator-catalog:v4.20
        # Try to pull existing catalog to add to it, but don't fail if it doesn't exist (first release)
        if docker pull "$CATALOG_IMG" 2>/dev/null; then
          if [[ "$VERSION" != *"-"* ]]; then
            make catalog-build-multiarch CATALOG_IMG=$CATALOG_IMG BUNDLE_IMGS=$BUNDLE_IMG CATALOG_BASE_IMG=$CATALOG_IMG \
              BUILD_ARGS="$EXPIRY_LABEL" CATALOG_EXTRA_IMG=quay.io/dbewley/bewley-operator-catalog:latest
          else
            make catalog-build-multiarch CATALOG_IMG=$CATALOG_IMG BUNDLE_IMGS=$BUNDLE_IMG CATALOG_BASE_IMG=$CATALOG_IMG \
              BUILD_ARGS="$EXPIRY_LABEL"
          fi
        else
          if [[ "$VERSION" != *"-"* ]]; then
            make catalog-build-multiarch CATALOG_IMG=$CATALOG_IMG BUNDLE_IMGS=$BUNDLE_IMG BUILD_ARGS="$EXPIRY_LABEL" \
              CATALOG_EXTRA_IMG=quay.io/dbewley/bewley-operator-catalog:latest
          else
            make catalog-build-multiarch CATALOG_IMG=$CATALOG_IMG BUNDLE_IMGS=$BUNDLE_IMG BUILD_ARGS="$EXPIRY_LABEL"
          fi
        fi

    - name: Verify release images are multi-arch manifest lists
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        set -euo pipefail
        verify() {
          local img="$1"
          echo "---- verifying $img ----"
          local raw
          raw="$(docker buildx imagetools inspect "$img" --raw)"
          if ! echo "$raw" | jq -e '.manifests != null and (.manifests | length) > 1' >/dev/null; then
            echo "ERROR: $img is not a multi-arch manifest list (expected index with linux/amd64 and linux/arm64)."
            docker buildx imagetools inspect "$img" || true
            exit 1
          fi
          local plats
          plats="$(echo "$raw" | jq -r '.manifests[] | select(.platform != null) | "\(.platform.os)/\(.platform.architecture)"')"
          echo "$plats"
          echo "$plats" | grep -qx 'linux/amd64' || { echo "ERROR: missing linux/amd64 in $img"; exit 1; }
          echo "$plats" | grep -qx 'linux/arm64' || { echo "ERROR: missing linux/arm64 in $img"; exit 1; }
        }
        verify "quay.io/dbewley/ovn-recon-operator:${VERSION}"
        verify "quay.io/dbewley/ovn-recon-operator-bundle:${VERSION}"
        verify "quay.io/dbewley/bewley-operator-catalog:v4.20"
        if [[ "$VERSION" != *"-"* ]]; then
          verify "quay.io/dbewley/ovn-recon-operator:latest"
          verify "quay.io/dbewley/ovn-recon-operator-bundle:latest"
          verify "quay.io/dbewley/bewley-operator-catalog:latest"
        fi
