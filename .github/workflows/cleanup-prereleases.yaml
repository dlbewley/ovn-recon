name: Cleanup Old Pre-releases

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch: # Enable manual trigger

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Purge pre-releases after full release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PURGE_AFTER_DAYS: 7
        run: |
          echo "Fetching releases..."
          # Fetch the last 100 releases via API (compatible across gh versions)
          releases=$(gh api -H "Accept: application/vnd.github+json" "/repos/${{ github.repository }}/releases?per_page=100")

          # Identify stable releases and their publication dates.
          stable_releases=$(echo "$releases" | jq -r '.[] | select(.prerelease == false) | "\(.tag_name) \(.published_at)"')

          # Stable version tags, ascending by semver (sort -V tolerates the "v" prefix).
          stable_tags_sorted=$(echo "$stable_releases" | awk 'NF {print $1}' | sort -V)

          now_ts=$(date +%s)

          echo "Checking pre-releases..."
          echo "$releases" | jq -c '.[] | select(.prerelease == true)' | while read -r pre; do
            tag=$(echo "$pre" | jq -r .tag_name)

            # Strip the pre-release suffix to the base version (e.g. v0.3.5-a.2 -> v0.3.5).
            # Assumes semver-like tags (vX.Y.Z-suffix).
            base_tag=$(echo "$tag" | sed -E 's/-.*//')

            # A pre-release is superseded once ANY stable release >= its base version
            # ships. The base version itself is often skipped (the release script bumps
            # the version), so an exact vX.Y.Z match is too strict -- find the smallest
            # stable version that is >= base_tag instead.
            superseding_tag=""
            while read -r s; do
              [ -z "$s" ] && continue
              smaller=$(printf '%s\n%s\n' "$base_tag" "$s" | sort -V | head -1)
              if [ "$smaller" = "$base_tag" ]; then
                superseding_tag="$s"
                break
              fi
            done <<< "$stable_tags_sorted"

            if [ -z "$superseding_tag" ]; then
              echo "Keeping pre-release $tag: no stable release >= $base_tag yet (upcoming version)."
              continue
            fi

            published_at=$(echo "$stable_releases" | awk -v t="$superseding_tag" '$1 == t { print $2; exit }')
            published_ts=$(date -d "$published_at" +%s)
            age_days=$(( (now_ts - published_ts) / 86400 ))

            if [ "$age_days" -ge "$PURGE_AFTER_DAYS" ]; then
              echo "Purging pre-release $tag: superseded by stable $superseding_tag published $age_days days ago."
              gh release delete "$tag" --yes --cleanup-tag -R ${{ github.repository }}
            else
              echo "Keeping pre-release $tag: superseding stable $superseding_tag is only $age_days days old."
            fi
          done
