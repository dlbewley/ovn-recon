name: Collector Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths:
      - 'collector/**'
      - '.github/workflows/collector-release.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - 'collector/**'
      - '.github/workflows/collector-release.yaml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: false

      - name: Test
        run: |
          cd collector
          make test

      - name: Build
        run: |
          cd collector
          make build

      - name: Set Release Metadata
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          if [[ "$VERSION" == *"-"* ]]; then
            EXPIRY_TIME=$(date -d "30 days" +%s)
            echo "EXPIRY_LABEL=--label quay.expires-at=$EXPIRY_TIME" >> $GITHUB_ENV
          else
            echo "EXPIRY_LABEL=" >> $GITHUB_ENV
          fi

      - name: Set up QEMU
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/setup-buildx-action@v4

      - name: Login to Quay.io
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USER }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Build and push collector image (multi-arch)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          DOCKER_BUILDX_NO_ISOLATED_BUILDER: "1"
        run: |
          set -euo pipefail
          echo "Building version $VERSION with $EXPIRY_LABEL"
          if [[ "$VERSION" != *"-"* ]]; then
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              $EXPIRY_LABEL \
              -t quay.io/dbewley/ovn-collector:$VERSION \
              -t quay.io/dbewley/ovn-collector:latest \
              --push \
              collector
          else
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              $EXPIRY_LABEL \
              -t quay.io/dbewley/ovn-collector:$VERSION \
              --push \
              collector
          fi

      - name: Verify collector image is a multi-arch manifest list
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          verify() {
            local img="$1"
            echo "---- verifying $img ----"
            local raw
            raw="$(docker buildx imagetools inspect "$img" --raw)"
            if ! echo "$raw" | jq -e '.manifests != null and (.manifests | length) > 1' >/dev/null; then
              echo "ERROR: $img is not a multi-arch manifest list (expected index with linux/amd64 and linux/arm64)."
              docker buildx imagetools inspect "$img" || true
              exit 1
            fi
            local plats
            plats="$(echo "$raw" | jq -r '.manifests[] | select(.platform != null) | "\(.platform.os)/\(.platform.architecture)"')"
            echo "$plats"
            echo "$plats" | grep -qx 'linux/amd64' || { echo "ERROR: missing linux/amd64 in $img"; exit 1; }
            echo "$plats" | grep -qx 'linux/arm64' || { echo "ERROR: missing linux/arm64 in $img"; exit 1; }
          }
          verify "quay.io/dbewley/ovn-collector:${VERSION}"
          if [[ "$VERSION" != *"-"* ]]; then
            verify "quay.io/dbewley/ovn-collector:latest"
          fi
