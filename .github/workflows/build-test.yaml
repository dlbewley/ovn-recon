name: Build and Test

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for creating releases
      packages: write  # Optional, for future package publishing

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Test
      run: npm run test

    - name: Build Asset
      run: npm run build

    - name: Set Release Metadata
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        if [[ "$VERSION" == *"-"* ]]; then
          # Set pre-release images to expire in 30 days in Quay
          EXPIRY_TIME=$(date -d "30 days" +%s)
          echo "EXPIRY_LABEL=--label quay.expires-at=$EXPIRY_TIME" >> $GITHUB_ENV
        else
          echo "EXPIRY_LABEL=" >> $GITHUB_ENV
        fi

    - name: Set up QEMU
      if: startsWith(github.ref, 'refs/tags/v')
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      if: startsWith(github.ref, 'refs/tags/v')
      uses: docker/setup-buildx-action@v4

    - name: Login to Quay.io
      if: startsWith(github.ref, 'refs/tags/v')
      uses: docker/login-action@v4
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_USER }}
        password: ${{ secrets.QUAY_TOKEN }}

    - name: Build and push console plugin image (multi-arch)
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        DOCKER_BUILDX_NO_ISOLATED_BUILDER: "1"
      run: |
        set -euo pipefail
        echo "Building version $VERSION with $EXPIRY_LABEL"
        if [[ "$VERSION" != *"-"* ]]; then
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            $EXPIRY_LABEL \
            -t quay.io/dbewley/ovn-recon:$VERSION \
            -t quay.io/dbewley/ovn-recon:latest \
            --push .
        else
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            $EXPIRY_LABEL \
            -t quay.io/dbewley/ovn-recon:$VERSION \
            --push .
        fi

    - name: Verify console plugin image is a multi-arch manifest list
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        set -euo pipefail
        verify() {
          local img="$1"
          echo "---- verifying $img ----"
          local raw
          raw="$(docker buildx imagetools inspect "$img" --raw)"
          if ! echo "$raw" | jq -e '.manifests != null and (.manifests | length) > 1' >/dev/null; then
            echo "ERROR: $img is not a multi-arch manifest list (expected index with linux/amd64 and linux/arm64)."
            docker buildx imagetools inspect "$img" || true
            exit 1
          fi
          local plats
          plats="$(echo "$raw" | jq -r '.manifests[] | select(.platform != null) | "\(.platform.os)/\(.platform.architecture)"')"
          echo "$plats"
          echo "$plats" | grep -qx 'linux/amd64' || { echo "ERROR: missing linux/amd64 in $img"; exit 1; }
          echo "$plats" | grep -qx 'linux/arm64' || { echo "ERROR: missing linux/arm64 in $img"; exit 1; }
        }
        verify "quay.io/dbewley/ovn-recon:${VERSION}"
        if [[ "$VERSION" != *"-"* ]]; then
          verify "quay.io/dbewley/ovn-recon:latest"
        fi

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        generate_release_notes: true
        prerelease: ${{ contains(github.ref_name, '-') }}
